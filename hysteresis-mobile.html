<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Hysteresis Loop Explorer</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:     #0d0f14;
    --bg3:    #1a1e28;
    --border: rgba(255,255,255,0.08);
    --border2:rgba(255,255,255,0.14);
    --text:   #e8eaf0;
    --muted:  #7a8099;
    --accent: #6ee7b7;
    --accent2:#818cf8;
    --mono:   'IBM Plex Mono', monospace;
    --sans:   'IBM Plex Sans', sans-serif;
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    font-size: 14px;
    overflow: hidden;
  }

  .page {
    height: 100vh;
    display: flex;
    flex-direction: column;
    padding: 8px;
    gap: 8px;
  }

  /* ── header ── */
  .hdr {
    display: flex;
    align-items: baseline;
    gap: 10px;
    padding: 2px 4px;
    flex-shrink: 0;
  }
  .hdr h1 {
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 500;
    color: var(--accent);
    letter-spacing: 0.05em;
  }
  .hdr p {
    font-size: 11px;
    color: var(--muted);
    font-weight: 300;
  }

  /* ── preset pills ── */
  .preset-row {
    display: flex;
    gap: 6px;
    overflow-x: auto;
    flex-shrink: 0;
    padding-bottom: 2px;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
  }
  .preset-row::-webkit-scrollbar { display: none; }

  .preset-btn {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 20px;
    color: var(--muted);
    font-family: var(--mono);
    font-size: 11px;
    padding: 6px 14px;
    cursor: pointer;
    white-space: nowrap;
    flex-shrink: 0;
    transition: border-color 0.15s, color 0.15s, background 0.15s;
  }
  .preset-btn.active {
    border-color: var(--accent2);
    background: rgba(129,140,248,0.12);
    color: #c7d2fe;
  }

  /* ── canvas ── */
  .canvas-wrap {
    flex: 1;
    min-height: 0;
    position: relative;
  }
  canvas {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
  }

  /* ── slider ── */
  .slider-block {
    flex-shrink: 0;
    padding: 0 4px;
  }
  .slider-header {
    display: flex;
    justify-content: space-between;
    margin-bottom: 6px;
  }
  .slider-header .name {
    font-size: 12px;
    color: var(--muted);
  }
  .slider-header .val {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--accent);
  }
  input[type=range] {
    -webkit-appearance: none;
    width: 100%;
    height: 4px;
    background: var(--bg3);
    border-radius: 2px;
    outline: none;
    cursor: pointer;
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 22px;
    height: 22px;
    border-radius: 50%;
    background: var(--accent2);
    border: 3px solid var(--bg);
    cursor: pointer;
  }
  input[type=range]::-moz-range-thumb {
    width: 22px;
    height: 22px;
    border-radius: 50%;
    background: var(--accent2);
    border: 3px solid var(--bg);
    cursor: pointer;
  }
  .slider-hints {
    display: flex;
    justify-content: space-between;
    font-size: 10px;
    color: #4a5070;
    margin-top: 3px;
  }

  /* ── metrics ── */
  .metrics {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 6px;
    flex-shrink: 0;
  }
  .metric {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 6px 8px;
    text-align: center;
  }
  .metric .mlabel {
    font-size: 9px;
    color: var(--muted);
    font-family: var(--mono);
    margin-bottom: 2px;
  }
  .metric .mval {
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 500;
    color: var(--accent);
  }

  /* ── insight ── */
  .insight {
    border: 1px solid var(--border);
    border-left: 3px solid var(--accent2);
    border-radius: 0 6px 6px 0;
    padding: 8px 12px;
    background: rgba(129,140,248,0.05);
    font-size: 11px;
    line-height: 1.6;
    color: #b0b8d0;
    flex-shrink: 0;
    max-height: 72px;
    overflow-y: auto;
  }
  .insight strong { color: var(--text); font-weight: 500; }

  .char-badge {
    display: inline-block;
    font-family: var(--mono);
    font-size: 9px;
    padding: 2px 6px;
    border-radius: 3px;
    letter-spacing: 0.06em;
    margin-right: 6px;
    vertical-align: middle;
  }
  .char-hard { background: rgba(251,113,133,0.15); color: #fda4af; border: 1px solid rgba(251,113,133,0.3); }
  .char-soft { background: rgba(110,231,183,0.12); color: #6ee7b7; border: 1px solid rgba(110,231,183,0.25); }
  .char-sp   { background: rgba(251,191,36,0.12);  color: #fcd34d; border: 1px solid rgba(251,191,36,0.25); }
  .char-mid  { background: rgba(129,140,248,0.12); color: #a5b4fc; border: 1px solid rgba(129,140,248,0.25); }
</style>
</head>
<body>
<div class="page">

  <div class="hdr">
    <h1>hysteresis explorer</h1>
    <p>mobile</p>
  </div>

  <div class="preset-row" id="presets"></div>

  <div class="canvas-wrap">
    <canvas id="c"></canvas>
  </div>

  <div class="slider-block">
    <div class="slider-header">
      <span class="name">Grain size</span>
      <span class="val" id="v-grain">1</span>
    </div>
    <input type="range" id="s-grain" min="1" max="10" step="0.5" value="1">
    <div class="slider-hints"><span>fine / SP</span><span>coarse / MD</span></div>
  </div>

  <div class="metrics">
    <div class="metric"><div class="mlabel">Hc</div><div class="mval" id="m-hc">—</div></div>
    <div class="metric"><div class="mlabel">Mr/Ms</div><div class="mval" id="m-mr">—</div></div>
    <div class="metric"><div class="mlabel">Ms</div><div class="mval" id="m-ms">—</div></div>
    <div class="metric"><div class="mlabel">Area</div><div class="mval" id="m-area">—</div></div>
  </div>

  <div class="insight" id="insight">Select a preset or move the slider.</div>

</div>

<script>
const PRESETS = [
  { id:'iron',      name:'Iron (α-Fe)',       tag:'soft',  char:'soft', grain:8,  temp:3, defect:2, aniso:3,
    note:'<strong>Iron</strong> is a classic soft ferromagnet. Coarse, low-defect grains allow domain walls to sweep easily, giving low Hc and low hysteretic loss.' },
  { id:'magnetite', name:'Magnetite (Fe₃O₄)', tag:'mixed', char:'mid',  grain:5,  temp:3, defect:4, aniso:5,
    note:'<strong>Magnetite</strong> sits in the middle ground. Fine to medium grains give moderate Hc. Key carrier in paleomagnetism.' },
  { id:'hematite',  name:'Hematite (α-Fe₂O₃)',tag:'hard',  char:'hard', grain:3,  temp:3, defect:5, aniso:8,
    note:'<strong>Hematite</strong> has very high magnetocrystalline anisotropy giving high Hc despite weak Ms — dominant remanence carrier in red beds.' },
  { id:'permalloy', name:'Permalloy',          tag:'ultra-soft', char:'soft', grain:9, temp:2, defect:1, aniso:1,
    note:'<strong>Permalloy</strong> is engineered to near-zero anisotropy and magnetostriction. The loop is vanishingly thin — minimal energy loss per cycle.' },
  { id:'ferritin',  name:'Ferritin',           tag:'SP bio', char:'sp', grain:1, temp:5, defect:3, aniso:2,
    note:'<strong>Ferritin</strong> stores iron as a ~8 nm core. At room temperature these nanoparticles are superparamagnetic — no remanence, no coercivity.' },
];

const state = { grain:1, temp:1, defect:1, aniso:1 };

// build preset pills
const presetsEl = document.getElementById('presets');
PRESETS.forEach(p => {
  const btn = document.createElement('button');
  btn.className = 'preset-btn';
  btn.dataset.id = p.id;
  btn.textContent = p.name;
  btn.addEventListener('click', () => applyPreset(p));
  presetsEl.appendChild(btn);
});

// slider
const grainSlider = document.getElementById('s-grain');
const grainVal    = document.getElementById('v-grain');
grainSlider.addEventListener('input', e => {
  state.grain = +e.target.value;
  grainVal.textContent = state.grain;
  document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('insight').textContent =
    state.grain <= 3
      ? 'Fine / single-domain grains: domain wall motion is suppressed. Hc peaks in the stable SD range, then drops toward zero as grains approach the SP threshold.'
      : state.grain >= 8
      ? 'Coarse / multi-domain grains: domain walls nucleate and sweep easily. Hc is low and Mr/Ms drops.'
      : 'Intermediate grain size: transitional SD→MD behavior. Hc peaks somewhere in this range for most materials.';
  draw();
});

function applyPreset(p) {
  Object.assign(state, { grain:p.grain, temp:p.temp, defect:p.defect, aniso:p.aniso });
  grainSlider.value    = state.grain;
  grainVal.textContent = state.grain;
  document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
  document.querySelector(`.preset-btn[data-id="${p.id}"]`).classList.add('active');
  document.getElementById('insight').innerHTML =
    `<span class="char-badge char-${p.char}">${p.char}</span>${p.note}`;
  draw();
}

// physics
function lerp(a,b,t){ return a+(b-a)*t; }
function clamp(v,lo,hi){ return Math.max(lo,Math.min(hi,v)); }

function computeParams() {
  const gN = (state.grain  - 1) / 9;
  const tN = (state.temp   - 1) / 9;
  const dN = (state.defect - 1) / 9;
  const aN = (state.aniso  - 1) / 9;
  const isSP = state.grain === 1;

  let Hc = lerp(0.82, 0.18, gN) * (1 + 0.6*aN) * (1 + 0.5*dN) * (1 - 0.75*tN);
  if (state.grain < 3.5) {
    const rolloff = (state.grain - 1) / (3.5 - 1);
    Hc *= rolloff;
  }
  Hc = clamp(Hc, isSP ? 0.0 : 0.03, 1.0);

  const Ms = 1.0;

  let MrRatio = isSP ? 0.0 : clamp(lerp(0.85,0.45,gN)*(1-0.5*tN)*(1+0.2*aN), 0.0, 0.98);
  if (!isSP && state.grain < 3.5) MrRatio *= (state.grain - 1) / (3.5 - 1);
  const Mr = Ms * MrRatio;

  let shear = lerp(0.12, 0.65, gN) * (1 + 0.3*tN) * (1 - 0.3*aN);
  shear = clamp(shear, isSP ? 0.7 : 0.05, 0.85);

  return { Hc, Ms, Mr, shear, isSP, MrRatio };
}

function loopM(H, Hc, Ms, width, upper, isSP) {
  if (isSP)   return Ms * Math.tanh(H / width);
  if (upper)  return Ms * Math.tanh((H - Hc) / width);
  return Ms * Math.tanh((H + Hc) / width);
}

// drawing
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');

function draw() {
  const W = canvas.parentElement.offsetWidth;
  const H = canvas.parentElement.offsetHeight;
  canvas.width  = W * devicePixelRatio;
  canvas.height = H * devicePixelRatio;
  canvas.style.width  = W + 'px';
  canvas.style.height = H + 'px';
  ctx.scale(devicePixelRatio, devicePixelRatio);

  const p = computeParams();
  const { Hc, Ms, Mr, shear, isSP, MrRatio } = p;

  document.getElementById('m-hc').textContent   = Hc.toFixed(3);
  document.getElementById('m-mr').textContent   = MrRatio.toFixed(3);
  document.getElementById('m-ms').textContent   = Ms.toFixed(3);
  document.getElementById('m-area').textContent = isSP ? '0.000' : (4*Hc*Ms*0.68).toFixed(3);

  const mx=44, my=20, mr=36, mb=32;
  const pw = W - mx - mr;
  const ph = H - my - mb;
  const cx = mx + pw/2;
  const cy = my + ph/2;

  const loopWidth = (isSP ? 0 : Hc) + Ms*(0.35 + shear*2.2);
  const Hmax = Math.max(Hc + loopWidth*4.5, 0.55);
  const toX = h => cx + (h/Hmax)*(pw/2);
  const toY = m => cy - (m/Ms)*(ph/2)*0.86;

  ctx.clearRect(0,0,W,H);

  // grid
  ctx.strokeStyle='rgba(255,255,255,0.05)'; ctx.lineWidth=0.5; ctx.setLineDash([4,6]);
  for(const v of [-0.5,0.5]){
    ctx.beginPath(); ctx.moveTo(toX(v*Hmax),my); ctx.lineTo(toX(v*Hmax),my+ph); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(mx,toY(v*Ms)); ctx.lineTo(mx+pw,toY(v*Ms)); ctx.stroke();
  }
  ctx.setLineDash([]);

  // axes
  ctx.strokeStyle='rgba(255,255,255,0.22)'; ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(mx,cy); ctx.lineTo(mx+pw,cy); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(cx,my); ctx.lineTo(cx,my+ph); ctx.stroke();

  // arrowheads
  ctx.fillStyle='rgba(255,255,255,0.22)';
  function arrowHead(x,y,ang){
    ctx.save(); ctx.translate(x,y); ctx.rotate(ang);
    ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(-6,3); ctx.lineTo(-6,-3); ctx.closePath(); ctx.fill();
    ctx.restore();
  }
  arrowHead(mx+pw, cy, 0);
  arrowHead(cx, my, -Math.PI/2);

  // axis labels
  ctx.fillStyle='rgba(255,255,255,0.3)'; ctx.font='10px IBM Plex Mono,monospace';
  ctx.textAlign='center';
  ctx.fillText('H →', cx, H-6);
  ctx.save(); ctx.translate(11,cy); ctx.rotate(-Math.PI/2);
  ctx.fillText('M', 0, 0); ctx.restore();

  // loop
  const N=300; const upper=[],lower=[];
  for(let i=0;i<=N;i++){
    const Hv=lerp(-Hmax,Hmax,i/N);
    upper.push([Hv, loopM(Hv,Hc,Ms,loopWidth,true,isSP)]);
    lower.push([Hv, loopM(Hv,Hc,Ms,loopWidth,false,isSP)]);
  }

  if(!isSP){
    ctx.beginPath();
    upper.forEach(([h,m],i)=>{ const x=toX(h),y=toY(m); i===0?ctx.moveTo(x,y):ctx.lineTo(x,y); });
    lower.slice().reverse().forEach(([h,m])=>ctx.lineTo(toX(h),toY(m)));
    ctx.closePath();
    ctx.fillStyle='rgba(129,140,248,0.07)'; ctx.fill();
  }

  const loopColor = isSP ? '#fcd34d' : '#818cf8';
  ctx.strokeStyle=loopColor; ctx.lineWidth=2.5; ctx.lineJoin='round'; ctx.lineCap='round';
  for(const pts of [upper,lower]){
    ctx.beginPath();
    pts.forEach(([h,m],i)=>{ const x=toX(h),y=toY(m); i===0?ctx.moveTo(x,y):ctx.lineTo(x,y); });
    ctx.stroke();
  }

  // direction arrows
  function drawArrow(x1,y1,x2,y2,color){
    const ang=Math.atan2(y2-y1,x2-x1),len=9;
    ctx.fillStyle=color;
    ctx.beginPath();
    ctx.moveTo(x2,y2);
    ctx.lineTo(x2-len*Math.cos(ang-0.42),y2-len*Math.sin(ang-0.42));
    ctx.lineTo(x2-len*Math.cos(ang+0.42),y2-len*Math.sin(ang+0.42));
    ctx.closePath(); ctx.fill();
  }
  const ui=Math.round(upper.length*0.62);
  const li=Math.round(lower.length*0.18);
  drawArrow(toX(upper[ui-3][0]),toY(upper[ui-3][1]),toX(upper[ui][0]),toY(upper[ui][1]),loopColor);
  drawArrow(toX(lower[li+3][0]),toY(lower[li+3][1]),toX(lower[li][0]),toY(lower[li][1]),loopColor);

  // annotations
  const annotColor='#6ee7b7';
  const annotPts = isSP
    ? [[0,0,'origin']]
    : [[Hc,0,'+Hc'],[-Hc,0,'−Hc'],[0,Mr,'+Mr'],[0,-Mr,'−Mr'],[Hmax,Ms,'+Ms'],[-Hmax,-Ms,'−Ms']];

  ctx.font='10px IBM Plex Mono,monospace'; ctx.fillStyle=annotColor;
  annotPts.forEach(([h,m,lbl])=>{
    const x=toX(h),y=toY(m);
    ctx.beginPath(); ctx.arc(x,y,3,0,Math.PI*2); ctx.fill();
    ctx.textAlign = h>=0?'left':'right';
    ctx.fillText(lbl, x+(h>=0?7:-7), y+(m>=0?-5:13));
  });

  if(isSP){
    ctx.fillStyle='#fcd34d'; ctx.font='10px IBM Plex Mono,monospace'; ctx.textAlign='left';
    ctx.fillText('superparamagnetic', mx+6, my+14);
  }
}

applyPreset(PRESETS[0]);
const ro=new ResizeObserver(()=>draw());
ro.observe(document.querySelector('.canvas-wrap'));
</script>
</body>
</html>
